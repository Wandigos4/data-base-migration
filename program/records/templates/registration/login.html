<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Авторизація</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f3f5f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            background: white;
            padding: 35px;
            border-radius: 10px;
            width: 350px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        h1 {
            color: #1f4e79;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #1f4e79;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #173a5a;
        }

        .error {
            color: red;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Вхід</h1>

        {% if form.errors %}
            <p class="error">Неправильний логін або пароль.</p>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <label>Логін</label>
            {{ form.username }}

            <label>Пароль</label>
            {{ form.password }}

            <button type="submit">Увійти</button>
        </form>
    </div>
</body>
</html>
